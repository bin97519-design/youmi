server:
  port: 8083

spring:
  application:
    name: youmi-api
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/youmi_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ''
      database: 0
  sql:
    init:
      mode: always
      encoding: utf-8
  h2:
    console:
      enabled: true
      path: /h2-console

youmi:
  auth:
    token-ttl-seconds: 604800
  ai:
    base-url: https://api.deepseek.com
    chat-path: /chat/completions
    api-key: ''
    model: deepseek-v4-flash
    temperature: 0.35
    timeout-seconds: 45
  image:
    base-url: https://api.apimart.ai
    generation-path: /v1/images/generations
    task-path: /v1/tasks
    api-key: ''
    fallback-enabled: true
    fallback-provider: gettoken
    get-token-base-url: https://nb.gettoken.cn/openapi/v1
    get-token-api-key: ${GETTOKEN_API_KEY:${YOUMI_GETTOKEN_API_KEY:}}
    get-token-query-path: /query
    model: gpt-image-2
    default-size: "9:16"
    default-resolution: 2K
    language: zh
    persist-generated-images: true
    upload-endpoint: http://101.133.149.214/prod-api/api/v1/file/upload
    upload-field-name: file
    timeout-seconds: 60
  minimax:
    base-url: https://api.minimaxi.com/anthropic
    messages-path: /v1/messages
    api-key: ${MINIMAX_API_KEY:}
    model: MiniMax-M3
    max-tokens: 1600
    temperature: 0.6
    timeout-seconds: 60
  detect:
    base-url: ''
    api-key: ''
    path: /api/detect
    timeout-seconds: 30
  dashscope:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${DASHSCOPE_API_KEY:}
    model: qwen3.6-plus
    max-tokens: 4000
    temperature: 0.2
    timeout-seconds: 60
