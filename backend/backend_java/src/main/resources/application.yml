server:
  port: 8080

spring:
  application:
    name: youmi-api
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/youmi_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:1s}
      timeout: ${REDIS_TIMEOUT:1s}
  sql:
    init:
      mode: always
      encoding: utf-8
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

youmi:
  file:
    upload-dir: ${YOUMI_FILE_UPLOAD_DIR:uploads}
    public-prefix: ${YOUMI_FILE_PUBLIC_PREFIX:/uploads}
  oss:
    enabled: ${OSS_ENABLED:true}
    endpoint: ${OSS_ENDPOINT:oss-cn-shanghai.aliyuncs.com}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${OSS_BUCKET_NAME:huami-canvas}
    public-base-url: ${OSS_PUBLIC_BASE_URL:https://huami-canvas.oss-cn-shanghai.aliyuncs.com}
    sts-role-arn: ${OSS_STS_ROLE_ARN:}
    sts-endpoint: ${OSS_STS_ENDPOINT:sts.cn-shanghai.aliyuncs.com}
    cors-auto-configure: ${OSS_CORS_AUTO_CONFIGURE:true}
  auth:
    token-ttl-seconds: 604800
  image:
    base-url: https://api.apimart.ai
    generation-path: /v1/images/generations
    task-path: /v1/tasks
    api-key: ${YOUMI_IMAGE_API_KEY:${APIMART_API_KEY:${APIMART_IMAGE_API_KEY:}}}
    proxy-base-url: ${PROXY_BASE_URL:http://47.90.226.52}
    proxy-api-key: ${IMAGE_PROXY_API_KEY:${PROXY_AUTH_TOKEN:}}
    proxy-generation-path: ${PROXY_GENERATION_PATH:/api/images/jobs}
    proxy-task-path: ${PROXY_TASK_PATH:/api/images/jobs}
    apimart-direct-base-url: ${YOUMI_IMAGE_APIMART_DIRECT_BASE_URL:https://apib.ai}
    apimart-direct-api-key: ${YOUMI_IMAGE_APIMART_DIRECT_API_KEY:${APIMART_API_KEY:${APIMART_IMAGE_API_KEY:}}}
    apimart-direct-generation-path: ${YOUMI_IMAGE_APIMART_DIRECT_GENERATION_PATH:/v1/images/generations}
    apimart-direct-task-path: ${YOUMI_IMAGE_APIMART_DIRECT_TASK_PATH:/v1/tasks}
    fallback-enabled: ${YOUMI_IMAGE_FALLBACK_ENABLED:true}
    get-token-base-url: https://nb.gettoken.cn/openapi/v1
    get-token-api-key: ${GETTOKEN_API_KEY:${YOUMI_GETTOKEN_API_KEY:}}
    get-token-query-path: /query
    model: gpt-image-2
    default-size: "9:16"
    default-resolution: 2K
    language: zh
    persist-generated-images: true
    upload-endpoint: http://101.133.149.214/youmi-api/api/v1/file/upload
    upload-field-name: file
    timeout-seconds: 60
    upload-timeout-seconds: 120
  credit:
    prices:
      IMAGE: 10
      VIDEO: 50
  dashscope:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${DASHSCOPE_API_KEY:}
    model: qwen3.7-plus
    max-tokens: 4000
    temperature: 0.2
    timeout-seconds: 60
  xfyun:
    base-url: ${XFYUN_VISION_BASE_URL:https://maas-coding-api.cn-huabei-1.xf-yun.com/v2}
    chat-path: ${XFYUN_VISION_CHAT_PATH:/chat/completions}
    api-key: ${XFYUN_VISION_API_KEY:${XFYUN_API_KEY:${SPARK_API_KEY:}}}
    model: ${XFYUN_VISION_MODEL:xopkimik26}
    max-tokens: ${XFYUN_VISION_MAX_TOKENS:4000}
    temperature: ${XFYUN_VISION_TEMPERATURE:0.0}
    timeout-seconds: ${XFYUN_VISION_TIMEOUT_SECONDS:60}
  ecommerce-set:
    max-concurrent: 3
    retry-count: 2
    default-model: gpt-image-2
    planning-model: qwen3.7-plus
    poll-interval-ms: 2000
