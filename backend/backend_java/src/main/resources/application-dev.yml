server:
  port: 8085

spring:
  application:
    name: youmi-api
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/youmi_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ''
      database: 0
  sql:
    init:
      mode: always
      encoding: utf-8
  h2:
    console:
      enabled: true
      path: /h2-console

youmi:
  auth:
    token-ttl-seconds: 604800
  file:
    upload-dir: ${YOUMI_FILE_UPLOAD_DIR:uploads}
    public-prefix: ${YOUMI_FILE_PUBLIC_PREFIX:/uploads}
  oss:
    enabled: ${OSS_ENABLED:true}
    endpoint: ${OSS_ENDPOINT:oss-cn-shanghai.aliyuncs.com}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${OSS_BUCKET_NAME:huami-canvas}
    custom-domain: ${OSS_CUSTOM_DOMAIN:}
    sts-region-id: ${OSS_STS_REGION_ID:cn-shanghai}
    sts-endpoint: ${OSS_STS_ENDPOINT:sts.cn-shanghai.aliyuncs.com}
    sts-role-arn: ${OSS_STS_ROLE_ARN:}
    sts-role-session-name: ${OSS_STS_ROLE_SESSION_NAME:youmi-upload}
    sts-duration-seconds: ${OSS_STS_DURATION_SECONDS:3600}
    sts-policy: ${OSS_STS_POLICY:}
    cors-auto-configure: ${OSS_CORS_AUTO_CONFIGURE:true}
    cors-allowed-origins: ${OSS_CORS_ALLOWED_ORIGINS:http://127.0.0.1:5174,http://localhost:5174,http://101.133.149.214}
  ai:
    base-url: https://api.deepseek.com
    chat-path: /chat/completions
    api-key: ''
    model: deepseek-v4-flash
    temperature: 0.35
    timeout-seconds: 45
  image:
    base-url: https://api.apimart.ai
    generation-path: /v1/images/generations
    task-path: /v1/tasks
    api-key: ''
    fallback-enabled: true
    fallback-provider: gettoken
    get-token-base-url: https://nb.gettoken.cn/openapi/v1
    get-token-api-key: ${GETTOKEN_API_KEY:${YOUMI_GETTOKEN_API_KEY:}}
    get-token-query-path: /query
    model: gpt-image-2
    default-size: "9:16"
    default-resolution: 2K
    language: zh
    persist-generated-images: true
    upload-endpoint: ${YOUMI_UPLOAD_ENDPOINT:http://127.0.0.1:8083/api/file/upload}
    upload-field-name: file
    timeout-seconds: 60
    upload-timeout-seconds: 120
  minimax:
    base-url: https://api.minimaxi.com/anthropic
    messages-path: /v1/messages
    api-key: ${MINIMAX_API_KEY:}
    model: MiniMax-M3
    max-tokens: 1600
    temperature: 0.6
    timeout-seconds: 60
  detect:
    base-url: ''
    api-key: ''
    path: /api/detect
    timeout-seconds: 30
  dashscope:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${DASHSCOPE_API_KEY:}
    model: qwen3.6-plus
    max-tokens: 4000
    temperature: 0.2
    timeout-seconds: 60
