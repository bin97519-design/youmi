server:
  port: 8083

spring:
  application:
    name: youmi-api
  datasource:
    # 本地内嵌 H2 数据库，文件模式，重启数据保留
    url: jdbc:h2:file:./data/youmi;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password: ''
    driver-class-name: org.h2.Driver
  data:
    redis:
      # Redis 不可用时使用占位，RedisUtil 会捕获异常回退
      host: 127.0.0.1
      port: 6379
      password: ''
      database: 0
      timeout: 200ms
  sql:
    init:
      mode: always
      encoding: utf-8
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  h2:
    console:
      enabled: true
      path: /h2-console
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

youmi:
  auth:
    token-ttl-seconds: 604800
  ai:
    base-url: https://api.deepseek.com
    chat-path: /chat/completions
    api-key: ${YOUMI_AI_API_KEY:}
    model: deepseek-chat
    temperature: 0.35
    timeout-seconds: 45
  image:
    base-url: https://api.apimart.ai
    generation-path: /v1/images/generations
    task-path: /v1/tasks
    api-key: ${YOUMI_IMAGE_API_KEY:}
    fallback-enabled: false
    fallback-provider: gettoken
    get-token-base-url: https://nb.gettoken.cn/openapi/v1
    get-token-api-key: ${GETTOKEN_API_KEY:}
    get-token-query-path: /query
    model: gpt-image-2
    default-size: "9:16"
    default-resolution: 2K
    language: zh
    persist-generated-images: false
    upload-endpoint: http://101.133.149.214/prod-api/api/v1/file/upload
    upload-field-name: file
    timeout-seconds: 60
    upload-timeout-seconds: 120
  minimax:
    base-url: https://api.minimaxi.com/anthropic
    messages-path: /v1/messages
    api-key: ${MINIMAX_API_KEY:}
    model: MiniMax-M3
    max-tokens: 1600
    temperature: 0.6
    timeout-seconds: 60
  detect:
    base-url: ''
    api-key: ''
    path: /api/detect
    timeout-seconds: 30
  dashscope:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${DASHSCOPE_API_KEY:}
    model: qwen-plus
    max-tokens: 4000
    temperature: 0.2
    timeout-seconds: 60
