<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Style Collector</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <strong>DOM Style Collector</strong>
          <span>运行态 DOM + 样式采集</span>
        </div>
      </header>

      <label class="field">
        <span>额外 selector，一行一个</span>
        <textarea id="selectors" spellcheck="false"></textarea>
      </label>

      <section class="options">
        <label><input id="includeTree" type="checkbox" checked /> 采集 DOM 树</label>
        <label><input id="includeAssets" type="checkbox" checked /> 采集资源</label>
        <label><input id="includeText" type="checkbox" checked /> 采集文本</label>
      </section>

      <div class="actions">
        <button id="collect">采集并导出 JSON</button>
        <button id="previewBtn">只预览</button>
      </div>

      <section class="stats">
        <span id="status">等待采集</span>
      </section>

      <pre id="preview"></pre>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
